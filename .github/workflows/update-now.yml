name: Update now data

on:
  schedule:
    # Every 4 hours
    - cron: '17 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch now data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          GOODREADS_USER_ID: ${{ secrets.GOODREADS_USER_ID }}
        run: node scripts/fetch-now.mjs

      - name: Commit if changed
        run: |
          git config user.name "now-bot"
          git config user.email "now-bot@users.noreply.github.com"
          if ! git diff --quiet src/data/now.json; then
            git add src/data/now.json
            git commit -m "chore(now): refresh listening/reading data"
            git push
          else
            echo "No changes."
          fi
